{% extends 'base.html' %}

{% block title %}TaskFlow - Eliminar Categoría{% endblock %}
{% block page_title %}Eliminar Categoría{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="form-card card p-4 text-center">
            <div class="card-body">
                <div class="mb-3">
                    <div class="rounded-circle d-flex align-items-center justify-content-center mx-auto"
                         style="width:64px;height:64px;background:#fee2e2;">
                        <i class="bi bi-trash3 text-danger fs-3"></i>
                    </div>
                </div>
                <h5 class="fw-bold mb-2">¿Eliminar esta categoría?</h5>
                <p class="fw-semibold">"{{ category.name }}"</p>
                <p class="text-muted small mb-4">Las tareas asociadas quedarán sin categoría.</p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash me-2"></i>Eliminar
                    </button>
                    <a href="{% url 'category_list' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
